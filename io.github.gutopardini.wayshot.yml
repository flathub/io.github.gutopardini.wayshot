app-id: io.github.gutopardini.wayshot
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: wayshot

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/wayshot/cargo

modules:
  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dfishcompletiondir=no
    sources:
      - type: git
        url: https://github.com/bugaevc/wl-clipboard.git
        tag: v2.2.1
        commit: 3eb912c274042cd5deed6b478b39908a12f37498

  - name: wayshot
    buildsystem: simple
    sources:
      - type: git
        url: https://github.com/gutopardini/wayshot.git
        tag: v0.1.6
        commit: 0530f9726dde69048dbf2c4b65d28c6a507895c0
      - cargo-sources.json
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/wayshot /app/bin/wayshot
      - install -Dm644 LICENSE /app/share/licenses/io.github.gutopardini.wayshot/LICENSE
      - install -Dm644 data/io.github.gutopardini.wayshot.desktop /app/share/applications/io.github.gutopardini.wayshot.desktop
      - install -Dm644 data/io.github.gutopardini.wayshot.metainfo.xml /app/share/metainfo/io.github.gutopardini.wayshot.metainfo.xml
      - install -Dm644 assets/icons/wayshot-icon.svg /app/share/icons/hicolor/scalable/apps/io.github.gutopardini.wayshot.svg
      - install -Dm644 assets/app-icons/256x256/apps/io.github.gutopardini.wayshot.png /app/share/icons/hicolor/256x256/apps/io.github.gutopardini.wayshot.png
      - install -Dm644 assets/app-icons/512x512/apps/io.github.gutopardini.wayshot.png /app/share/icons/hicolor/512x512/apps/io.github.gutopardini.wayshot.png
