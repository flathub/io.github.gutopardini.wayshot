app-id: io.github.gutopardini.wayshot
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: wayshot
rename-icon: wayshot-icon

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/wayshot/cargo

modules:
  - name: wayshot
    buildsystem: simple
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/wayshot -t /app/bin/
      - install -Dm644 data/${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 data/${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/icons/wayshot-icon.svg -t /app/share/icons/hicolor/scalable/apps/
    sources:
      - type: git
        url: https://github.com/gutopardini/wayshot.git
        tag: v0.1.2
        commit: 484138d7f0650d7e587e9ed816e257fb4fc5898c
      - cargo-sources.json
