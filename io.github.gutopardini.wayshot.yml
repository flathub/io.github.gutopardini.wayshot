app-id: io.github.gutopardini.wayshot
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: wayshot
rename-icon: wayshot-icon

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/wayshot/cargo

modules:
  - name: wl-clipboard
    buildsystem: meson
    config-opts:
      - -Dfishcompletiondir=no
    sources:
      - type: git
        url: https://github.com/bugaevc/wl-clipboard.git
        tag: v2.2.1
        commit: 3eb912c274042cd5deed6b478b39908a12f37498

  - name: wayshot
    buildsystem: simple
    build-commands:
      - cargo build --release --locked
      - install -Dm755 target/release/wayshot -t /app/bin/
      - install -Dm644 LICENSE -t /app/share/licenses/${FLATPAK_ID}/
      - install -Dm644 data/${FLATPAK_ID}.desktop -t /app/share/applications/
      - install -Dm644 data/${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 assets/icons/wayshot-icon.svg -t /app/share/icons/hicolor/scalable/apps/
      - install -Dm644 assets/app-icons/256x256/apps/${FLATPAK_ID}.png -t /app/share/icons/hicolor/256x256/apps/
      - install -Dm644 assets/app-icons/512x512/apps/${FLATPAK_ID}.png -t /app/share/icons/hicolor/512x512/apps/
    sources:
      - type: git
        url: https://github.com/gutopardini/wayshot.git
        tag: v0.1.4
        commit: 8866e9398070dfdad5ce5507627d0546334fe5fc
      - cargo-sources.json
